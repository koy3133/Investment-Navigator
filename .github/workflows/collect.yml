name: collect-indices

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install pykrx yfinance pandas requests
      - name: 지수 수집
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          ECOS_KEY: ${{ secrets.ECOS_KEY }}
          REB_KEY: ${{ secrets.REB_KEY }}
        run: python indices_collector.py
      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data_indices.js
          git diff --cached --quiet || git commit -m "자동 수집 $(date -u +'%Y-%m-%d %H:%M')"
          git push
